name: Build Veriscope Edge

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Veriscope Edge
        run: |
          python veriscope_edge_generator.py

      - name: Upload output
        uses: actions/upload-artifact@v4
        with:
          name: Veriscope_Edge
          path: output/
          if-no-files-found: error
